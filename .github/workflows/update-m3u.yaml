name: Actualizar canales.m3u

on:
  schedule:
    - cron: "0 * * * *"   # Ejecuta cada hora en el minuto 0
  workflow_dispatch:       # Permite lanzarlo manualmente también

jobs:
  update-m3u:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Ejecutar script de actualización
        env:
          GITHUB_TOKEN: ${{ secrets.ghp_w52qFuytZHfQLesFRemSnwL8z3XlTU }}
        run: |
          python update_tokens.py

      - name: Commit y push de cambios
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add canales.m3u
          git commit -m "Actualización automática de tokens en canales.m3u" || echo "No hay cambios"
          git push