name: Actualizar canales.m3u

on:
  schedule:
    - cron: "0 * * * *"   # Ejecuta cada hora en el minuto 0
  workflow_dispatch:       # Permite lanzarlo manualmente también

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Permite que GITHUB_TOKEN tenga acceso de escritura al repo

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests
          pip install playwright

      - name: Ejecutar script de actualización
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python update_tokens.py



   
