name: Actualizar canales.m3u

on:
  schedule:
    - cron: "0 * * * *"   # cada hora
  workflow_dispatch:

permissions:
  contents: write   # ✅ NECESARIO para actualizar el repo

jobs:
  update-m3u:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'   # ✅ 3.14 aún no es estable en Actions

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests

      - name: Instalar navegadores Playwright
        run: playwright install --with-deps

      - name: Ejecutar script update_tokens.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # ✅ CLAVE
        run: python update_tokens.py
